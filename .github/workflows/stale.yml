# This workflow warns and then closes issues and PRs that have had no activity for a specified amount of time.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/actions/stale
name: Mark stale issues and pull requests

on:
  schedule:
  - cron: '38 15 * * *'

jobs:
  stale:

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v10
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: >-
          This issue has been automatically marked as stale because it has not
          had recent activity. It will be closed if no further activity occurs.
          Comment to keep it open or remove the stale label.
        stale-pr-message: >-
          This pull request has been automatically marked as stale because it
          has not had recent activity. It will be closed if no further activity
          occurs. Push a new commit or comment to keep it open.
        close-issue-message: >-
          This issue was closed because it has been stalled for an extended
          period with no activity.
        close-pr-message: >-
          This pull request was closed because it has been stalled for an
          extended period with no activity.
        stale-issue-label: 'no-issue-activity'
        stale-pr-label: 'no-pr-activity'
        days-before-stale: 60
        days-before-close: 14
        exempt-issue-labels: 'pinned,security,help-wanted'
        exempt-pr-labels: 'pinned,security'
