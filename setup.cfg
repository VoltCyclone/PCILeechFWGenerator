# Project metadata, build options, dependencies, entry points, pytest config
# and pylint config all live in pyproject.toml. The sections below are kept
# only for tools that don't yet read pyproject.toml directly.

[flake8]
max_line_length = 88
extend_ignore = E203, W503
# ^ Black-compatible: E203 and W503 have edge cases handled by black
exclude =
    .tox
    build
    dist
    .eggs
    docs/conf.py

[pyscaffold]
# PyScaffold marker file (informational only).
version = 0.6.0
package = pcileechfwgenerator
